# Seattle City Light — Residential Time-of-Use Rate Schedule
# Effective: January 2026
# Source: https://www.seattle.gov/city-light/customers/billing/rates
#
# Community contributions: see CONTRIBUTING.md for how to add or update utility rates.
# When submitting a PR, verify against the utility's official rate schedule page.

utility_id: seattle_city_light
utility_name: Seattle City Light
currency: USD
last_verified: 2026-01-01
source_url: https://www.seattle.gov/city-light/customers/billing/rates

# Rate periods by day type and hour (local time, 24h)
# Periods: off_peak, mid_peak, peak
schedules:
  # Weekdays (Mon–Sat)
  weekday:
    - period: off_peak
      start_hour: 0      # midnight
      end_hour: 6        # 6 AM
    - period: mid_peak
      start_hour: 6      # 6 AM
      end_hour: 17       # 5 PM
    - period: peak
      start_hour: 17     # 5 PM
      end_hour: 21       # 9 PM
    - period: mid_peak
      start_hour: 21     # 9 PM
      end_hour: 24       # midnight

  # Weekends and holidays (all mid-peak)
  weekend:
    - period: mid_peak
      start_hour: 0
      end_hour: 24

# Rates in USD per kWh
rates:
  off_peak: 0.0767
  mid_peak: 0.1089
  peak: 0.1687

# Net metering export credit rate (USD/kWh)
# Typically same as off-peak retail rate
net_metering_credit: 0.0767

# Holidays treated as weekends (US federal holidays)
holidays:
  - "01-01"  # New Year's Day
  - "07-04"  # Independence Day
  - "11-25"  # Thanksgiving (approximate — last Thursday November)
  - "12-25"  # Christmas
